name: Release Aligner ZIP

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package extension
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq rsync zip
          chmod +x scripts/package-extension.sh
          ./scripts/package-extension.sh
          VERSION="${GITHUB_REF_NAME#v}"
          cp "dist/aligner-v${VERSION}.zip" "dist/aligner.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/aligner-v*.zip
            dist/aligner.zip
            wordpress/aligner-wp-tools-helper.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
